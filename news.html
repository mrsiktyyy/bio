    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05050A;
            font-family: 'Inter', sans-serif;
            color: #EFF1FF;
            line-height: 1.5;
            overflow-x: hidden;
        }
        body::-webkit-scrollbar { width: 0px; background: transparent; }
        body { scrollbar-width: none; -ms-overflow-style: none; }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.7), inset 0 0 40px rgba(105,112,255,0.2);
        }
        body::after {
            content: "";

            top: 0;
            left: 0;
            width: 100%;

            background-size: cover;
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            transform: scaleY(-1);
            transform-origin: center;
        }
        .light-source-1, .light-source-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
            filter: blur(60px);
            animation: floatLight 20s infinite alternate ease-in-out;
        }
        .light-source-1 {
            background: radial-gradient(circle, rgba(105,112,255,0.4), rgba(133,151,255,0));
            top: 10%;
            left: -10%;
        }
        .light-source-2 {
            background: radial-gradient(circle, rgba(133,151,255,0.35), rgba(105,112,255,0));
            bottom: 5%;
            right: -10%;
            animation-duration: 25s;
            animation-delay: -5s;
        }
        @keyframes floatLight {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(10%, 15%) scale(1.2); opacity: 0.4; }
        }
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(105,112,255,0.35), rgba(133,151,255,0.12) 45%, transparent 75%);

            transform: translate(-50%, -50%);

        }
        .container {
            max-width: 1280px;
            margin: 0 auto;

            z-index: 10;
        }
        .navbar {
            padding: 25px 0 20px;

        .logo {
            font-size: 1.9rem;
            font-weight: 800;

        }
        @keyframes subtleGlow {
            0% { text-shadow: 0 0 0px rgba(133,151,255,0); opacity: 0.9; }
            100% { text-shadow: 0 0 5px rgba(133,151,255,0.3); opacity: 1; }
        }
        .neon-text {
            background: linear-gradient(135deg, #6970FF, #8597FF);

        .nav-links { display: flex; gap: 2rem; }

            text-decoration: none;

        }
        .nav-links a:hover, .nav-links a.active { color: #8597FF; text-shadow: 0 0 6px #6970FF; transform: scale(1.05); }

        h1 { font-size: 1.8rem; margin-bottom: 10px; }

            color: #9aabff;

        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-author { font-weight: 700; font-size: 1.05rem; color: #eef3ff; }
        .post-date { font-size: 0.75rem; color: #8a9eff; margin-top: 4px; }

        .read-more {

        .pagination { display: flex; justify-content: center; gap: 16px; margin: 40px 0 30px; }
        .page-btn {
            background: rgba(30,35,70,0.7);

        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { text-align: center; color: #8a9eff; font-size: 0.8rem; margin-top: 10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; overflow-y: auto; padding: 20px; }
        .modal-content { max-width: 700px; width: 100%; background: rgba(10,12,25,0.95); border-radius: 36px; border: 1px solid rgba(105,112,255,0.5); padding: 28px; position: relative; max-height: 90vh; overflow-y: auto; animation: modalFadeIn 0.3s ease; }
        .modal-content::-webkit-scrollbar { width: 4px; }
        .modal-content::-webkit-scrollbar-track { background: #1e223a; border-radius: 4px; }
        .modal-content::-webkit-scrollbar-thumb { background: #6970FF; border-radius: 4px; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-close { position: absolute; top: 20px; right: 24px; font-size: 28px; cursor: pointer; color: #8597FF; transition: 0.2s; }

        .modal-title { font-size: 1.8rem; font-weight: 700; background: linear-gradient(125deg, #FFF, #b8c4ff); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 20px; padding-right: 30px; }
        .modal-media { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
        .modal-media img, .modal-media video { max-width: 100%; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.2s; }

        .modal-text { font-size: 1rem; color: #dde3ff; line-height: 1.65; white-space: pre-wrap; }

        footer { text-align: center; padding: 30px 0 40px; border-top: 1px solid rgba(133,151,255,0.2); margin-top: 20px; color: #8f9eff; }
        @media (max-width: 650px) { .navbar { flex-direction: column; align-items: center; } .post { padding: 18px; } .post-title { font-size: 1.3rem; } .modal-content { padding: 20px; } }

        .fade-up { opacity: 0; transform: translateY(25px); animation: fadeUp 2s cubic-bezier(0.2,0.9,0.4,1.1) forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
    </style>
</head>
<body>

<div class="light-source-2"></div>

<div class="container">
    <nav class="navbar fade-up">
        <div class="logo"><span class="neon-text">MrSiktyyy</span> ✦</div>
        <div class="nav-links">

        <p><i class="fab fa-telegram"></i> © 2026 — MrSiktyyy · Все права защищены.</p>

</div>

<!-- Модальное окно -->
<div id="postModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div class="modal-title" id="modalTitle"></div>
        <div id="modalMedia" class="modal-media"></div>
        <div id="modalText" class="modal-text"></div>
    </div>
</div>

<script>
    const AUTHOR_AVATAR = "ava3.jpg";
    const POSTS_PER_PAGE = 5;
    const modal = document.getElementById('postModal');
    
    const postsData = [
        {
            "title": "Три дня разработки: как создавался этот сайт",
            "text": "Доброго времени суток! Сегодня третий день, как я веду разработку этого веб-проекта. Идея пришла спонтанно — я решил попробовать себя в веб-разработке, вдохновившись современными минималистичными интерфейсами. Поскольку сейчас время искусственного интеллекта, я обратился к нейросети DeepSeek. Она отлично справляется с поиском информации и написанием кода, а отсутствие генерации изображений меня не смущает — это не входило в задачи. DeepSeek постоянно обновляется, поэтому выбор пал на неё.\n\nЗа первый вечер я сделал только каркас: простую главную страницу, никакого фона, никакой анимации. Страница новостей тоже не работала — бесконечная загрузка, технически она отсутствовала. Сайт был сырым.\n\nНа второй день добавил рабочий модуль новостей, создал страницу Minecraft-сервера и инициировал сам сервер. Конечно, он ещё не готов, но прогресс очевиден. Тогда же появились фоновые изображения, исправлены ключевые баги — визуальная составляющая улучшилась.\n\nТретий день — сегодня. Утром был в школе, завтра тоже учёба, домашние задания. В будни времени мало, поэтому моя активность ограничится фиксом мелких ошибок и постепенным рефакторингом. Сегодня я полностью переработал страницу команды: теперь вместо обычной ссылки на Telegram — полноценный раздел с разработчиками и админами, их социальными сетями. Планирую дорабатывать и дальше.\n\nНа уроке информатики подошёл к учителю — он похвалил, но указал на некрасивый URL: раньше сайт отображался как «mrsiktyyy.vercel.app/index.html», что неправильно с точки зрения архитектуры. Я оперативно это исправил. Теперь:\n• mrsiktyyy.vercel.app — Главная\n• mrsiktyyy.vercel.app/news — Новости\n• и так далее.\n\nНа этом пока всё. Надеюсь, вам было интересно узнать о зарождении этого проекта, о людях, которые над ним работают, и о процессе. Всем хорошего настроения и чистого кода!",
            "date": "12 мая 2026, 16:13",
            "media": ["posts/post4_1.png", "posts/post4_2.png"]
        },
        {
            "title": "Спасибо учителю английского!",
            "text": "Сегодня учительница по Английскому языку поставила мне пять. Но взамен я публикую этот пост. Спасибо вам большое, Тереньтева Александра Сергеевна! Вы очень добры, хорошо учите и ваши уроки очень хорошие! Мне приятно получать знания от такого замечательного учителя. Хорошего настроения в школе!",
            "date": "12 мая 2026, 14:19",
            "media": ["posts/post3_1.png", "posts/post3_2.png"]
        },
        {
            "title": "🏔️ Ханты — хранители тайги и рек",
            "text": "Ханты – это один из коренных народов Западной Сибири. Они живут в основном в Ханты-Мансийском и Ямало-Ненецком округах, а ещё немного – на севере Томской области. Их земли — это бескрайняя тайга, полноводные реки и холодные болота, где природа остаётся почти нетронутой.\n\nЕсли открыть карту, то ханты расселились широко: от реки Демьянки и Васюгана на юге до самой Обской губы на севере. Раньше, в древности, их предки жили на ещё большей территории — от низовий Оби до Барабинских степей и от Енисея до самого Зауралья. В бассейнах рек Северная Сосьва, Ляпин, Пелым и Конда до сих пор можно найти старинные стойбища.\n\nИнтересно, что учёные считают: культура хантов сложилась из двух ветвей. Местные таёжные охотники и рыболовы встретились с кочевыми уграми, которые пришли с южных степей примерно в I тысячелетии до нашей эры. Так и родился народ, сумевший сохранить свой язык и традиции.\n\nПо мнению исследователей, в конце II – начале I тысячелетия до нашей эры произошёл распад древней угорской общности. Тогда и начали формироваться предки современных хантов, манси и венгров. Каждая группа пошла своим путём, но ханты остались в сибирской тайге, приспособились к суровому климату и научились жить в гармонии с природой.\n\nСегодня ханты – это не только прошлое. Они сохраняют оленеводство, рыболовство, резьбу по кости и дереву. Их шаманские песни, орнаменты и легенды до сих пор передаются из поколения в поколение. Многие современные ханты живут в городах, но при этом помнят свои корни и возвращаются в стойбища, чтобы отпраздновать медвежий праздник или покормить духов реки.\n\nЭта работа — небольшая попытка рассказать о народе, который тысячелетиями остаётся частью Сибири. Надеюсь, тебе было интересно узнать о хантах так же, как и мне.",
            "date": "12 мая 2026, 11:42",
            "media": ["posts/020.png"]
        },
        {
            "title": "Как защитить себя в интернете — инструкция для всех",
            "text": "Как защитить себя в интернете — инструкция для всех\n\nПароли и аккаунты\n- Никому не говори свой пароль, даже друзьям. Храни его в голове или в блокноте дома, но не в заметках телефона.\n- Для каждого сайта придумывай разный пароль — хотя бы небольшие отличия. Используй фразу: например, «КотВася2009!» — легко запомнить.\n- Включи двухфакторную аутентификацию (подтверждение по SMS или приложению). Это как второй замок на двери.\n- Не заходи в свои аккаунты с чужих компьютеров. Если пришлось — обязательно выйди и смени пароль.\n\nОсторожно: вербовщики\nВ интернете могут писать незнакомцы и предлагать деньги: «подожги мусорку», «сфоткай военную часть», «брось камень в окно». Никогда не соглашайся! Это преступление, за которое посадят тебя. Даже если кажется, что никто не узнает — узнают.\n\n- Не общайся с теми, кто предлагает лёгкие деньги. Заблокируй и сообщи взрослому.\n- Расскажи родителям или учителю — они помогут.\n- Помни: деньги от таких «заказов» приведут только к тюрьме или опасности для жизни.\n\nОбщие правила\n- Не открывай ссылки от незнакомцев — там могут быть вирусы.\n- Не публикуй в соцсетях свой адрес, расписание, фото школы или важных объектов.\n- Если что-то кажется странным — советуйся с взрослыми.\n\nБудь умнее тех, кто хочет тобой манипулировать. Твоя безопасность — в твоих руках!",
            "date": "11 мая 2026, 18:56",
            "media": ["posts/post2.png"]
        }
    ];

    let currentPage = 1;
    const totalPosts = postsData.length;
    const totalPages = Math.ceil(totalPosts / POSTS_PER_PAGE);

    function getFileType(url) {
        const ext = url.split('.').pop().toLowerCase();
        if (['png','jpg','jpeg','gif','webp'].includes(ext)) return 'image';
        if (['mp4','webm','mov'].includes(ext)) return 'video';
        return 'file';
    }

    function renderPostCard(post, index) {
        const preview = post.text.length > 250 ? post.text.substring(0, 250) + '...' : post.text;
        let mediaPreview = '';
        if (post.media && post.media.length > 0) {
            const firstMedia = post.media[0];
            const type = getFileType(firstMedia);
            if (type === 'image') {
                mediaPreview = `<img src="${firstMedia}" class="preview-media" style="max-width:100%; max-height:160px; border-radius:20px; margin:12px 0;" onerror="this.style.display='none'">`;
            }
        }
        return `
            <div class="post" data-post-index="${index}">
                <div class="post-header">
                    <div class="post-avatar">
                        <img src="${AUTHOR_AVATAR}" alt="Аватар" onerror="this.src='https://placehold.co/52x52/6970FF/white?text=📝'">
                    </div>
                    <div>
                        <div class="post-author">MrSiktyyy</div>
                        <div class="post-date"><i class="far fa-clock"></i> ${post.date}</div>
                    </div>
                </div>
                <div class="post-title" onclick="openPostModal(${index})">${post.title}</div>
                ${mediaPreview}
                <div class="post-preview">${preview.replace(/\n/g, ' ')}</div>
                <div class="read-more" onclick="openPostModal(${index})">
                    <i class="fas fa-expand-alt"></i> Читать полностью
                </div>
            </div>
        `;
    }

    function renderCurrentPage() {
        const container = document.getElementById('postsContainer');
        if (!container) return;
        if (totalPosts === 0) {
            container.innerHTML = '<div class="post"><p style="text-align:center;">Пока нет постов. Скоро появятся!</p></div>';
            document.getElementById('paginationContainer').innerHTML = '';
            document.getElementById('pageInfo').innerHTML = '';
            return;
        }
        const start = (currentPage - 1) * POSTS_PER_PAGE;
        const end = start + POSTS_PER_PAGE;
        const pagePosts = postsData.slice(start, end);
        container.innerHTML = '';
        pagePosts.forEach((post, idx) => {
            container.innerHTML += renderPostCard(post, start + idx);
        });
        renderPagination();
    }

    function renderPagination() {
        const pagContainer = document.getElementById('paginationContainer');
        const infoContainer = document.getElementById('pageInfo');
        if (totalPages <= 1) {
            pagContainer.innerHTML = '';
            infoContainer.innerHTML = '';
            return;
        }
        let buttonsHtml = '';
        if (currentPage > 1) {
            buttonsHtml += `<button class="page-btn" onclick="goToPage(${currentPage - 1})">◀ Назад</button>`;
        } else {
            buttonsHtml += `<button class="page-btn" disabled>◀ Назад</button>`;
        }
        buttonsHtml += `<span style="color:#8a9eff; padding:0 12px;">${currentPage} / ${totalPages}</span>`;
        if (currentPage < totalPages) {
            buttonsHtml += `<button class="page-btn" onclick="goToPage(${currentPage + 1})">Дальше ▶</button>`;
        } else {
            buttonsHtml += `<button class="page-btn" disabled>Дальше ▶</button>`;
        }
        pagContainer.innerHTML = buttonsHtml;
        infoContainer.innerHTML = `📄 Всего постов: ${totalPosts} | Страница ${currentPage} из ${totalPages}`;
    }

    function goToPage(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderCurrentPage();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openPostModal(index) {
        const post = postsData[index];
        if (!post) return;
        document.getElementById('modalTitle').innerHTML = post.title;
        let mediaHtml = '';
        if (post.media && post.media.length > 0) {
            for (let url of post.media) {
                const type = getFileType(url);
                if (type === 'image') {
                    mediaHtml += `<img src="${url}" alt="изображение" style="max-width:100%; border-radius: 24px; margin-bottom: 10px;" onerror="this.style.display='none'">`;
                } else if (type === 'video') {
                    mediaHtml += `<video controls src="${url}" style="max-width:100%; border-radius: 24px;"></video>`;
                } else {
                    mediaHtml += `<a href="${url}" target="_blank" style="color:#8597FF;">📎 Скачать файл</a>`;
                }
            }
        }
        document.getElementById('modalMedia').innerHTML = mediaHtml;
        let textWithLinks = post.text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
        document.getElementById('modalText').innerHTML = textWithLinks.replace(/\n/g, '<br>');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = function(event) {
        if (event.target === modal) closeModal();
    };

    // Свечение за курсором (перенесено сюда, чтобы не потерять)
    const glow = document.getElementById('cursorGlow');
    let mx = 0, my = 0, gx = 0, gy = 0;
    document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
    function animateGlow() {
        gx += (mx - gx) * 0.12;
        gy += (my - gy) * 0.12;
        glow.style.left = gx + 'px';
        glow.style.top = gy + 'px';
        requestAnimationFrame(animateGlow);
    }
    animateGlow();

    renderCurrentPage();
</script>
</body>
</html>
