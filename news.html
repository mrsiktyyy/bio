<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости — MrSiktyyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05050A;
            font-family: 'Inter', sans-serif;
            color: #EFF1FF;
            line-height: 1.5;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.7), inset 0 0 40px rgba(105,112,255,0.2);
        }
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(105,112,255,0.35), rgba(133,151,255,0.12) 45%, transparent 75%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            filter: blur(28px);
            z-index: 1000;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }
        .navbar {
            padding: 25px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(133,151,255,0.2);
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .logo { font-size: 1.6rem; font-weight: 800; }
        .neon-text {
            background: linear-gradient(135deg, #6970FF, #8597FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a {
            text-decoration: none;
            color: #ccd6ff;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: #8597FF; text-shadow: 0 0 6px #6970FF; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; }
        .sub {
            color: #9aabff;
            margin-bottom: 40px;
            border-left: 3px solid #6970FF;
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .post {
            background: rgba(12, 14, 28, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(105,112,255,0.35);
            padding: 24px;
            margin-bottom: 32px;
            transition: 0.2s;
        }
        .post:hover {
            border-color: #8597FF;
            box-shadow: 0 10px 25px rgba(105,112,255,0.2);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #6970FF, #8597FF);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-author { font-weight: 700; font-size: 1rem; }
        .post-date { font-size: 0.75rem; color: #8f9eff; margin-top: 4px; }
        .post-text {
            font-size: 1rem;
            margin: 16px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .post-text a {
            color: #8597FF;
            text-decoration: none;
            border-bottom: 1px dashed;
        }
        .post-images {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }
        .post-images a {
            flex: 1;
            min-width: 120px;
        }
        .post-images img {
            width: 100%;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .post-images img:hover {
            transform: scale(1.02);
            border-color: #8597FF;
        }
        .loader, .error {
            text-align: center;
            padding: 40px;
            color: #9aabff;
        }
        footer {
            text-align: center;
            padding: 30px 0 40px;
            border-top: 1px solid rgba(133,151,255,0.2);
            margin-top: 50px;
            color: #8f9eff;
        }
        @media (max-width: 650px) {
            .navbar { flex-direction: column; align-items: center; }
            .post { padding: 18px; }
            .post-images a { min-width: 100%; }
        }
    </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="container">
    <nav class="navbar">
        <div class="logo"><span class="neon-text">MrSiktyyy</span> ✦</div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="news.html" class="active">Новости</a>
            <a href="index.html#social">Контакты</a>
            <a href="https://t.me/unsk1llteam" target="_blank">UnSkill Team</a>
        </div>
    </nav>

    <h1>📰 Лента новостей</h1>
    <div class="sub" id="updateStatus">
        <i class="fas fa-sync-alt"></i> Это последние посты из тгк UnSkill Team.
    </div>

    <div id="postsContainer">
        <div class="loader">Загрузка последних постов...</div>
    </div>

    <footer>
        <p><i class="fab fa-telegram"></i> © 2026 — MrSiktyyy · Все права защищены.</p>
    </footer>
</div>

<script>
    // Аватар автора из корня репозитория
    const AUTHOR_AVATAR = "ava3.png";
    const CHANNEL_NAME = "unsk1llteam";
    const POSTS_LIMIT = 10;

    // Эффект свечения за курсором
    const glow = document.getElementById('cursorGlow');
    let mx = 0, my = 0, gx = 0, gy = 0;
    document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
    function anim() {
        gx += (mx - gx) * 0.12;
        gy += (my - gy) * 0.12;
        glow.style.left = gx + 'px';
        glow.style.top = gy + 'px';
        requestAnimationFrame(anim);
    }
    anim();

    // Парсинг RSS через прокси
    async function fetchTelegramPosts() {
        const container = document.getElementById('postsContainer');
        const statusDiv = document.getElementById('updateStatus');
        
        try {
            container.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Загрузка последних постов...</div>';
            
            // RSS-ссылка от RSSHub
            const rssUrl = `https://rsshub.app/telegram/channel/${CHANNEL_NAME}`;
            // Используем публичный прокси для получения контента (обход CORS)
            const proxy = "https://api.allorigins.win/raw?url=";
            const response = await fetch(proxy + encodeURIComponent(rssUrl));
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const rssText = await response.text();
            
            // Парсим XML
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(rssText, "text/xml");
            
            // Проверка на ошибки парсинга
            const parseError = xmlDoc.querySelector("parsererror");
            if (parseError) throw new Error("Ошибка парсинга RSS");
            
            // Получаем все элементы <item>
            const items = xmlDoc.querySelectorAll("item");
            if (!items.length) throw new Error("Посты не найдены в RSS");
            
            // Преобразуем в массив объектов
            const posts = Array.from(items).slice(0, POSTS_LIMIT).map(item => {
                // Заголовок
                const title = item.querySelector("title")?.textContent || "";
                // Описание (основной текст)
                let description = item.querySelector("description")?.textContent || "";
                // Убираем возможные HTML-сущности и теги
                description = description.replace(/<br\s*\/?>/gi, "\n").replace(/<[^>]*>/g, "");
                // Дата публикации
                let pubDate = item.querySelector("pubDate")?.textContent || "";
                const date = new Date(pubDate);
                const formattedDate = isNaN(date.getTime()) ? "Дата неизвестна" : date.toLocaleString('ru-RU');
                // Ссылка на пост в Telegram
                const link = item.querySelector("link")?.textContent || "";
                // Извлечение картинок из description (оригинальный HTML внутри CDATA)
                // Для простоты ищем ссылки на изображения
                const imgRegex = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|webp))/gi;
                const images = [];
                let match;
                const rawDesc = item.querySelector("description")?.textContent || "";
                while ((match = imgRegex.exec(rawDesc)) !== null) {
                    if (!images.includes(match[0])) images.push(match[0]);
                }
                // Также можно проверить enclosure
                const enclosure = item.querySelector("enclosure");
                if (enclosure && enclosure.getAttribute("url")) {
                    const encUrl = enclosure.getAttribute("url");
                    if (!images.includes(encUrl)) images.unshift(encUrl);
                }
                
                return {
                    title,
                    text: description || title,
                    date: formattedDate,
                    link,
                    images: images.slice(0, 3)
                };
            });
            
            renderPosts(posts);
            statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Это последние посты из тгк UnSkill Team. (обновлено: ${new Date().toLocaleString('ru-RU')})`;
        } catch (error) {
            console.error(error);
            container.innerHTML = `<div class="error">
                <i class="fas fa-exclamation-triangle"></i> Не удалось загрузить посты.<br>
                Пожалуйста, попробуйте позже. Ошибка: ${error.message}
            </div>`;
            statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Ошибка соединения. Попробуйте позже.';
        }
    }

    function renderPosts(posts) {
        const container = document.getElementById('postsContainer');
        container.innerHTML = '';
        
        posts.forEach(post => {
            const postDiv = document.createElement('div');
            postDiv.className = 'post';
            
            // Обработка текста: заменяем ссылки
            let postText = post.text;
            postText = postText.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
            
            // Галерея изображений
            let imagesHtml = '';
            if (post.images && post.images.length) {
                imagesHtml = '<div class="post-images">' + post.images.map(img => `<a href="${img}" target="_blank"><img src="${img}" alt="Изображение" loading="lazy"></a>`).join('') + '</div>';
            }
            
            postDiv.innerHTML = `
                <div class="post-header">
                    <div class="post-avatar">
                        <img src="${AUTHOR_AVATAR}" alt="Аватар автора" onerror="this.src='https://placehold.co/48x48/6970FF/white?text=📝'">
                    </div>
                    <div>
                        <div class="post-author">MrSiktyyy</div>
                        <div class="post-date"><i class="far fa-clock"></i> ${post.date}</div>
                    </div>
                </div>
                <div class="post-text">${postText.replace(/\n/g, '<br>')}</div>
                ${imagesHtml}
                ${post.link ? `<div style="margin-top: 12px;"><a href="${post.link}" target="_blank" style="color: #8597FF; font-size: 0.8rem; text-decoration: none;"><i class="fab fa-telegram"></i> Смотреть в Telegram →</a></div>` : ''}
            `;
            container.appendChild(postDiv);
        });
    }

    document.addEventListener('DOMContentLoaded', fetchTelegramPosts);
</script>
</body>
</html>
