<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости — MrSiktyyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05050A;
            font-family: 'Inter', sans-serif;
            color: #EFF1FF;
            line-height: 1.5;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.7), inset 0 0 40px rgba(105,112,255,0.2);
        }
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(105,112,255,0.35), rgba(133,151,255,0.12) 45%, transparent 75%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            filter: blur(28px);
            z-index: 1000;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }
        .navbar {
            padding: 25px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(133,151,255,0.2);
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .logo { font-size: 1.6rem; font-weight: 800; }
        .neon-text {
            background: linear-gradient(135deg, #6970FF, #8597FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a {
            text-decoration: none;
            color: #ccd6ff;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links a:hover { color: #8597FF; text-shadow: 0 0 6px #6970FF; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; }
        .sub { color: #9aabff; margin-bottom: 40px; border-left: 3px solid #6970FF; padding-left: 15px; }

        /* Стиль поста как в Telegram, но с галереей до 3 фото */
        .post {
            background: rgba(12, 14, 28, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(105,112,255,0.35);
            padding: 24px;
            margin-bottom: 32px;
            transition: 0.2s;
        }
        .post:hover {
            border-color: #8597FF;
            box-shadow: 0 10px 25px rgba(105,112,255,0.2);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6970FF, #8597FF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .post-author { font-weight: 700; font-size: 1rem; }
        .post-date { font-size: 0.75rem; color: #8f9eff; margin-top: 4px; }
        .post-text {
            font-size: 1rem;
            margin: 16px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .post-text a {
            color: #8597FF;
            text-decoration: none;
            border-bottom: 1px dashed;
        }
        /* Галерея изображений (до 3) */
        .post-images {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }
        .post-images img {
            max-width: calc(33% - 8px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            flex: 1;
            min-width: 120px;
            object-fit: cover;
            transition: transform 0.2s;
        }
        .post-images img:hover {
            transform: scale(1.02);
            border-color: #8597FF;
        }
        footer {
            text-align: center;
            padding: 30px 0 40px;
            border-top: 1px solid rgba(133,151,255,0.2);
            margin-top: 50px;
            color: #8f9eff;
        }
        @media (max-width: 650px) {
            .navbar { flex-direction: column; align-items: center; }
            .post { padding: 18px; }
            .post-images img { max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="container">
    <nav class="navbar">
        <div class="logo"><span class="neon-text">MrSiktyyy</span> ✦</div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="news.html">Новости</a>
            <a href="index.html#social">Контакты</a>
            <a href="https://t.me/unsk1llteam" target="_blank">UnSkill Team</a>
        </div>
    </nav>

    <h1>📰 Лента новостей</h1>
    <div class="sub">Посты от MrSiktyyy — будь в курсе всего</div>

    <div id="postsContainer"></div>

    <footer>
        <p>✉️ Новые посты добавляются через <strong>Python-скрипт</strong> (выбор изображений, текст)</p>
        <p style="font-size: 0.8rem;">автоматический пуш в GitHub → Vercel обновляет сайт</p>
    </footer>
</div>

<script>
    // --------------------------------------------------------------
    // МАССИВ ПОСТОВ (обновляется скриптом автоматически)
    // Каждый пост: { text, date, images: [] } — до 3 ссылок на картинки
    // --------------------------------------------------------------
    const postsData = [
        {
            text: "Прошу, найдите мне такие же ушки жёлтого цвета, под мои волосы 🧡",
            date: "5 мая 2026, 18:22",
            images: []
        },
        {
            text: "Что лучше брать?\n\n🔹 https://www.ozon.ru/product/magnitnaya-mehanicheskaya-klaviatura-furycube-m68-he-mag-pro-switch-igrovaya-belyy-fioletovyy-2414950129/\n\n🔹 https://www.ozon.ru/product/klaviatura-magnitnaya-igrovaya-60-langtu-boom68-3117380242/",
            date: "3 мая 2026, 14:10",
            images: []
        },
        {
            text: "ПЕРЕХОДИ СКОРЕЕ НА ЭТОТ САЙТ\n>> https://mrsiktyyyy.vercel.app/ <<",
            date: "1 мая 2026, 20:45",
            images: []
        }
    ];
    // --------------------------------------------------------------

    function renderPosts() {
        const container = document.getElementById('postsContainer');
        if (!container) return;
        container.innerHTML = '';
        postsData.forEach(post => {
            const postDiv = document.createElement('div');
            postDiv.className = 'post';
            let imagesHtml = '';
            if (post.images && post.images.length > 0) {
                imagesHtml = '<div class="post-images">' + post.images.map(img => `<img src="${img}" alt="post image">`).join('') + '</div>';
            }
            let textWithLinks = post.text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
            postDiv.innerHTML = `
                <div class="post-header">
                    <div class="post-avatar">😺</div>
                    <div>
                        <div class="post-author">MrSiktyyy</div>
                        <div class="post-date">${post.date || 'Недавно'}</div>
                    </div>
                </div>
                <div class="post-text">${textWithLinks.replace(/\n/g, '<br>')}</div>
                ${imagesHtml}
            `;
            container.appendChild(postDiv);
        });
    }

    renderPosts();

    // Эффект свечения за курсором
    const glow = document.getElementById('cursorGlow');
    let mx = 0, my = 0, gx = 0, gy = 0;
    document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
    function anim() {
        gx += (mx - gx) * 0.12;
        gy += (my - gy) * 0.12;
        glow.style.left = gx + 'px';
        glow.style.top = gy + 'px';
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
</html>
